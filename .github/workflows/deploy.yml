name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Auto-bump service worker cache version using commit SHA
      - name: Auto-version service worker
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/const CACHE = 'life-os-v[^']*'/const CACHE = 'life-os-${SHORT_SHA}'/" sw.js
          echo "SW cache version → life-os-${SHORT_SHA}"

      # Warn if api.gs changed (needs manual redeploy)
      - name: Check if backend changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^backend/api\.gs$"; then
            echo "::warning::backend/api.gs was modified — you MUST redeploy Apps Script (Deploy → New version)"
          fi

      # Quality checks — fail build on broken JS or oversized file
      - name: Check file size
        run: |
          SIZE=$(wc -c < index.html)
          LINES=$(wc -l < index.html)
          echo "index.html: ${SIZE} bytes, ${LINES} lines"
          if [ "$SIZE" -gt 512000 ]; then
            echo "::error::index.html exceeds 500KB ($SIZE bytes) — consider splitting"
            exit 1
          fi
          if [ "$LINES" -gt 7000 ]; then
            echo "::warning::index.html exceeds 7,000 lines ($LINES) — split threshold approaching"
          fi

      - name: Check JS syntax
        run: |
          sed -n '/<script>/,/<\/script>/p' index.html | sed '1d;$d' > /tmp/app.js
          node --check /tmp/app.js
          echo "✅ JS syntax OK"

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
